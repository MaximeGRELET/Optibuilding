<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptiBuilding — Analyse énergétique</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <aside id="sidebar">

        <div id="sidebar-header">
          <h1>OptiBuilding</h1>
          <p class="subtitle">Analyse énergétique des bâtiments</p>
        </div>

        <div id="toolbar">
          <button id="btn-draw" class="tool-btn active" title="Dessiner une zone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="3,21 12,3 21,21"/>
            </svg>
            Dessiner
          </button>
          <button id="btn-select" class="tool-btn" title="Sélectionner une zone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
            </svg>
            Sélectionner
          </button>
          <button id="btn-delete" class="tool-btn danger" title="Supprimer la zone sélectionnée">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3,6 5,6 21,6"/>
              <path d="M19,6l-1,14H6L5,6"/>
            </svg>
            Supprimer
          </button>
        </div>

        <div id="zones-panel">
          <h2>Zones <span id="zone-count" class="badge">0</span></h2>
          <ul id="zone-list"></ul>
          <p id="zones-empty" class="hint">Dessinez des polygones sur la carte pour définir les zones thermiques.</p>
        </div>

        <div id="zone-form" class="hidden">
          <h2>Zone — <span id="form-zone-label"></span></h2>
          <div class="form-grid">
            <label>Libellé</label>
            <input type="text" id="f-label" placeholder="ex: RDC commercial" />

            <label>Hauteur (m)</label>
            <input type="number" id="f-height" value="3.0" min="1" max="50" step="0.5" />

            <label>Année de construction</label>
            <input type="number" id="f-year" value="1975" min="1900" max="2025" />

            <label>Usage</label>
            <select id="f-type">
              <option value="residential">Résidentiel</option>
              <option value="commercial">Commercial</option>
              <option value="office">Bureaux</option>
              <option value="mixed">Mixte</option>
            </select>

            <label>Plancher bas</label>
            <select id="f-ground">
              <option value="true">Sur terre-plein</option>
              <option value="false">Vide sanitaire / étage</option>
            </select>

            <label>Toiture</label>
            <select id="f-roof">
              <option value="true">Zone avec toiture</option>
              <option value="false">Plancher intermédiaire</option>
            </select>

            <label>Système de chauffage</label>
            <select id="f-heating">
              <option value="gas_boiler">Chaudière gaz</option>
              <option value="heat_pump">Pompe à chaleur</option>
              <option value="electric_direct">Électrique direct</option>
              <option value="district_heating">Réseau de chaleur</option>
            </select>
          </div>
          <button id="btn-save-zone" class="primary-btn">Enregistrer</button>
        </div>

        <div id="analyse-panel">
          <button id="btn-analyse" class="primary-btn full-width" disabled>
            Analyser le bâtiment
          </button>
          <p id="analyse-hint" class="hint">Définissez au moins une zone pour lancer l'analyse.</p>
        </div>

        <div id="results-panel" class="hidden">
          <div class="results-header">
            <h2>Résultats</h2>
            <button id="btn-close-results" class="icon-btn">✕</button>
          </div>

          <div id="dpe-section">
            <div id="dpe-badge-wrap">
              <div id="dpe-badge"></div>
              <div id="dpe-info">
                <div id="dpe-ep"></div>
                <div id="dpe-co2"></div>
              </div>
            </div>
          </div>

          <div id="key-figures"></div>

          <div id="renovation-section">
            <h3>Scénarios de rénovation</h3>
            <div id="renovation-cards"></div>
          </div>
        </div>

      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
